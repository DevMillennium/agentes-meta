# Phoenix Digital Omnichannel — Chatwoot (imagem oficial + extensões montadas)
services:
  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - chatwoot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chatwoot']
      interval: 5s
      timeout: 5s
      retries: 10

  chatwoot-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - chatwoot_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    env_file:
      - .env.chatwoot
    environment:
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://chatwoot-redis:6379
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_ENV: docker
    ports:
      - '3001:3000'
    volumes:
      - chatwoot_storage:/app/storage
      - ./chatwoot/public/brand-assets/logo.png:/app/public/brand-assets/logo.png:ro
      - ./chatwoot/public/brand-assets/logo_dark.png:/app/public/brand-assets/logo_dark.png:ro
      - ./chatwoot/public/brand-assets/logo_thumbnail.png:/app/public/brand-assets/logo_thumbnail.png:ro
      - ./chatwoot/public/brand-assets/logo_login.png:/app/public/brand-assets/logo_login.png:ro
      - ./chatwoot/public/brand-assets/phoenix-omnichannel.css:/app/public/brand-assets/phoenix-omnichannel.css:ro
      - ./chatwoot/public/manifest.json:/app/public/manifest.json:ro
      - ./chatwoot/app/views/layouts/vueapp.html.erb:/app/app/views/layouts/vueapp.html.erb:ro
      - ./chatwoot/config/routes.rb:/app/config/routes.rb:ro
      - ./chatwoot/app/controllers/webhooks/meta_controller.rb:/app/app/controllers/webhooks/meta_controller.rb:ro
      - ./chatwoot/app/services/phoenix:/app/app/services/phoenix:ro
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    env_file:
      - .env.chatwoot
    environment:
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://chatwoot-redis:6379
      RAILS_ENV: production
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
      - ./chatwoot/config/routes.rb:/app/config/routes.rb:ro
      - ./chatwoot/app/controllers/webhooks/meta_controller.rb:/app/app/controllers/webhooks/meta_controller.rb:ro
      - ./chatwoot/app/services/phoenix:/app/app/services/phoenix:ro
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

volumes:
  # Reutiliza dados da instalação Chatwoot anterior (conta, inboxes, tokens)
  chatwoot_postgres:
    external: true
    name: chatwoot_chatwoot_pg_data
  chatwoot_redis:
    external: true
    name: chatwoot_chatwoot_redis_data
  chatwoot_storage:
    external: true
    name: chatwoot_chatwoot_storage
